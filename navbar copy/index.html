<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavBar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <header>
    <div class = "navbar navbar-expand-lg navbar-dark bg-dark ">

        <div class = "container-fluid">
            
            <button class = "navbar-toggler" type = "button" data-bs-toggle="collapse" data-bs-target="#mainmenu">
                <span class = "navbar-toggler-icon"></span>
            </button>
            
            <img class = "navbar-brand" src = "logo.png" alt="logo" height="70">

            <div class = "collapse navbar-collapse" id = "mainmenu">

                <ul class="navbar-nav gap-3">

                    <li class="nav-item">
                        <a class = "nav-link active ms-3" href="#">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link disabled ms-3" href="#">Burgers</a> 
                    </li>

                    <li class="nav-item">
                        <a class="nav-link disabled ms-3" href="#">Pizzas</a> 
                    </li>

                    <li class="nav-item">
                        <a class="nav-link disabled ms-3" href="#">Drinks</a> 
                    </li>

                    <li class="nav-item">
                        <a class="nav-link disabled ms-3" href="#">Sauces</a> 
                    </li>

                    <li class="nav-item">
                        <a class="nav-link disabled ms-3" href="#">About</a> 
                    </li>

                </ul>

            </div>

        </div>
    </div>
    </header>
    <section class = "p-4">
    <div class = "card" style ="max-width: 14rem;">
        <img src = "image.png" class = "card-img-top" alt = "CaribBean Beef Burger">
        <div class = "card-body bg-secondary">
            <h5 class = "card-title" >
                CaribBean Beef Burger
            </h5>
            <p class = "card-text">
                Spicy, sweet and oh-so-simple. Ground Beef gets a peppery boost from jerk seasoning, and the freshly chopped mango salsa gives the dish a cool finish.
            </p>
            <button type = "button" class = "btn btn-dark">Add to Cart</button>
        </div>
    </div>
    </section>
</body>
</html>
