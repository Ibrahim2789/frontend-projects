<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="p-4">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <div class = "card" style ="max-width: 14rem;">
        <img src = "image.png" class = "card-img-top" alt = "CaribBean Beef Burger">
        <div class = "card-body bg-secondary">
            <h5 class = "card-title" >
                CaribBean Beef Burger
            </h5>
            <p class = "card-text">
                Spicy, sweet and oh-so-simple. Ground Beef gets a peppery boost from jerk seasoning, and the freshly chopped mango salsa gives the dish a cool finish.
            </p>
            <button type = "button" class = "btn btn-dark">Add to Cart</button>
        </div>
    </div>
</body>
</html>
